<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Ultimate Liquid Protocol - OS V6">
<meta name="theme-color" content="#000000">
<title>ULP // CORE SYSTEM V6</title>
<style>
    /* ==========================================================================
       [ FEATURE 01 ] MASSIVE CSS VARIABLE ARCHITECTURE
       [ FEATURE 02 ] DYNAMIC THEME ENGINE READY
       ========================================================================== */
    :root {
        --bg-core: #010203;
        --bg-panel: rgba(10, 12, 16, 0.65);
        --bg-glass: rgba(255, 255, 255, 0.02);
        --border-glass: rgba(0, 255, 204, 0.15);
        --border-highlight: rgba(0, 255, 204, 0.5);
        
        --color-primary: #00ffcc;
        --color-secondary: #0088ff;
        --color-alert: #ff0055;
        --color-warn: #ffaa00;
        --color-success: #00ff66;
        --color-text-main: #f0f4f8;
        --color-text-muted: #6272a4;
        
        --glow-primary: 0 0 20px rgba(0, 255, 204, 0.4);
        --glow-alert: 0 0 20px rgba(255, 0, 85, 0.4);
        
        --font-ui: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'Fira Code', 'Consolas', monospace;
        
        --z-bg: -100;
        --z-grid: 10;
        --z-ui: 100;
        --z-modal: 1000;
        --z-cursor: 9999;
        
        --radius-sm: 4px;
        --radius-md: 12px;
        --radius-lg: 24px;
        --radius-pill: 999px;
        
        --transition-snap: 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
        --transition-smooth: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        --transition-spring: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* ==========================================================================
       [ FEATURE 03 ] THEME MUTATIONS (MATRIX, CYBERPUNK, RETRO, VOID, NEON, ARCTIC)
       ========================================================================== */
    [data-theme="matrix"] {
        --bg-core: #000500; --bg-panel: rgba(0, 20, 0, 0.8);
        --color-primary: #00ff00; --color-secondary: #008800;
        --border-glass: rgba(0, 255, 0, 0.2); --glow-primary: 0 0 25px rgba(0, 255, 0, 0.5);
    }
    [data-theme="cyberpunk"] {
        --bg-core: #0d0221; --bg-panel: rgba(20, 0, 40, 0.8);
        --color-primary: #fcee0a; --color-secondary: #ff003c;
        --border-glass: rgba(252, 238, 10, 0.2); --glow-primary: 0 0 20px rgba(252, 238, 10, 0.4);
    }
    [data-theme="retro"] {
        --bg-core: #2b2b2b; --bg-panel: #c0c0c0;
        --color-primary: #000080; --color-secondary: #808080; --color-text-main: #000;
        --border-glass: #fff; --glow-primary: none;
    }
    [data-theme="void"] {
        --bg-core: #000; --bg-panel: #000; --border-glass: #111;
        --color-primary: #fff; --color-text-main: #fff; --color-text-muted: #333;
        --glow-primary: 0 0 10px rgba(255,255,255,0.1);
    }
    [data-theme="neon"] {
        --bg-core: #110022; --bg-panel: rgba(30, 0, 50, 0.6);
        --color-primary: #ff00ff; --color-secondary: #00ffff;
        --border-glass: rgba(255, 0, 255, 0.3); --glow-primary: 0 0 30px rgba(255, 0, 255, 0.6);
    }
    [data-theme="arctic"] {
        --bg-core: #e0fbfc; --bg-panel: rgba(255, 255, 255, 0.8);
        --color-primary: #293241; --color-secondary: #3d5a80;
        --color-text-main: #293241; --color-text-muted: #98c1d9;
        --border-glass: rgba(41, 50, 65, 0.1); --glow-primary: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* ==========================================================================
       [ FEATURE 04 ] CSS RESET & HARDWARE ACCELERATION BASE
       ========================================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
        background-color: var(--bg-core); color: var(--color-text-main);
        font-family: var(--font-ui); min-height: 100vh; overflow: hidden;
        user-select: none; -webkit-user-select: none;
    }
    ::selection { background: var(--color-primary); color: var(--bg-core); }

    /* ==========================================================================
       [ FEATURE 05 ] GPU ACCELERATED SCROLLBARS
       ========================================================================== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: var(--radius-pill); }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-primary); }

    /* ==========================================================================
       [ FEATURE 06 ] PROCEDURAL BACKGROUND ENGINE (CSS ONLY LAYER)
       ========================================================================== */
    #ambient-canvas {
        position: fixed; inset: 0; z-index: var(--z-bg);
        pointer-events: none; opacity: 0.6;
    }
    .crt-overlay {
        position: fixed; inset: 0; z-index: 9998; pointer-events: none;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 2px, 3px 100%; opacity: 0.15;
    }

    /* ==========================================================================
       [ FEATURE 07 ] CUSTOM HARDWARE CURSOR WITH TRAILING SPRING PHYSICS
       ========================================================================== */
    #cursor-dot {
        position: fixed; width: 4px; height: 4px; background: var(--color-primary);
        border-radius: 50%; pointer-events: none; z-index: var(--z-cursor);
        transform: translate(-50%, -50%); transition: width 0.1s, height 0.1s;
    }
    #cursor-ring {
        position: fixed; width: 30px; height: 30px; border: 1px solid var(--color-primary);
        border-radius: 50%; pointer-events: none; z-index: var(--z-cursor);
        transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background 0.2s;
        will-change: transform;
    }
    body.hovering #cursor-dot { width: 0; height: 0; }
    body.hovering #cursor-ring {
        width: 50px; height: 50px; background: rgba(0,255,204,0.1);
        border-color: rgba(0,255,204,0.5); backdrop-filter: blur(2px);
    }
    body.typing #cursor-ring { width: 10px; height: 10px; border-radius: 2px; animation: blink 1s infinite; }

    /* ==========================================================================
       [ FEATURE 08 ] DYNAMIC TASKBAR WITH HARDWARE TELEMETRY
       ========================================================================== */
    #taskbar {
        position: fixed; top: 0; left: 0; right: 0; height: 40px;
        background: var(--bg-panel); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-glass); z-index: var(--z-ui);
        display: flex; justify-content: space-between; align-items: center; padding: 0 1rem;
        font-family: var(--font-mono); font-size: 11px; color: var(--color-text-muted);
    }
    .tb-group { display: flex; align-items: center; gap: 15px; }
    .tb-item {
        display: flex; align-items: center; gap: 6px; padding: 4px 8px;
        border-radius: var(--radius-sm); transition: var(--transition-snap);
        cursor: none; border: 1px solid transparent;
    }
    .tb-item.interactive:hover {
        background: rgba(255,255,255,0.05); color: var(--color-primary);
        border-color: var(--border-glass);
    }
    .tb-icon { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }
    
    /* Hardware Gauges */
    .gauge-track { width: 50px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .gauge-fill { height: 100%; width: 0%; background: var(--color-primary); transition: width 0.5s ease-out, background 0.3s; }
    .gauge-fill.warn { background: var(--color-warn); }
    .gauge-fill.crit { background: var(--color-alert); }

    /* ==========================================================================
       [ FEATURE 09 ] DRAGGABLE & RESIZABLE CLI TERMINAL
       ========================================================================== */
    #terminal-window {
        position: fixed; top: 60px; left: 20px; width: 500px; height: 350px;
        background: rgba(5, 5, 10, 0.95); border: 1px solid var(--border-glass);
        border-radius: var(--radius-md); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        z-index: var(--z-modal); display: flex; flex-direction: column;
        opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95);
        transition: opacity var(--transition-smooth), transform var(--transition-smooth);
        backdrop-filter: blur(20px);
    }
    #terminal-window.active { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    
    .term-header {
        height: 30px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-glass);
        display: flex; justify-content: space-between; align-items: center; padding: 0 10px;
        font-family: var(--font-mono); font-size: 10px; color: var(--color-text-muted);
        border-radius: var(--radius-md) var(--radius-md) 0 0;
    }
    .term-drag-handle { flex: 1; height: 100%; display: flex; align-items: center; }
    .term-controls { display: flex; gap: 6px; }
    .term-btn { width: 10px; height: 10px; border-radius: 50%; background: #333; transition: 0.2s; }
    .term-btn.close:hover { background: var(--color-alert); box-shadow: 0 0 10px var(--color-alert); }
    .term-btn.min:hover { background: var(--color-warn); }
    .term-btn.max:hover { background: var(--color-success); }

    .term-body {
        flex: 1; padding: 10px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px;
        color: var(--color-text-main); display: flex; flex-direction: column; gap: 4px;
    }
    .term-line { word-wrap: break-word; line-height: 1.4; }
    .term-prompt { display: flex; gap: 8px; margin-top: 5px; }
    .term-user { color: var(--color-success); font-weight: bold; }
    .term-path { color: var(--color-secondary); font-weight: bold; }
    .term-input-field {
        flex: 1; background: transparent; border: none; outline: none;
        color: var(--color-text-main); font-family: var(--font-mono); font-size: 12px;
    }
    .term-input-field::selection { background: rgba(255,255,255,0.2); }

    /* ==========================================================================
       [ FEATURE 10 ] MAIN VIEWPORT & SCROLLING ENGINE
       ========================================================================== */
    #viewport {
        position: absolute; top: 40px; left: 0; right: 0; bottom: 0;
        overflow-y: auto; overflow-x: hidden; padding-bottom: 100px;
    }

    /* ==========================================================================
       [ FEATURE 11 ] GLITCH TEXT TITLE & PARALLAX HERO
       ========================================================================== */
    .hero { padding: 10vh 2rem 5vh; text-align: center; position: relative; }
    .glitch-box { display: inline-block; position: relative; }
    .hero-title {
        font-size: clamp(3rem, 8vw, 7rem); font-weight: 900; letter-spacing: -2px;
        text-transform: uppercase; color: var(--color-text-main);
        position: relative; text-shadow: var(--glow-primary);
        line-height: 1;
    }
    .hero-title::before, .hero-title::after {
        content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-core);
    }
    .hero-title::before {
        left: 3px; text-shadow: -2px 0 var(--color-alert);
        clip: rect(24px, 550px, 90px, 0); animation: glitch-1 3s infinite linear alternate-reverse;
    }
    .hero-title::after {
        left: -3px; text-shadow: -2px 0 var(--color-secondary);
        clip: rect(85px, 550px, 140px, 0); animation: glitch-2 2.5s infinite linear alternate-reverse;
    }
    @keyframes glitch-1 {
        0% { clip: rect(10px, 9999px, 44px, 0); } 20% { clip: rect(80px, 9999px, 11px, 0); }
        40% { clip: rect(33px, 9999px, 90px, 0); } 60% { clip: rect(50px, 9999px, 20px, 0); }
        80% { clip: rect(90px, 9999px, 55px, 0); } 100% { clip: rect(20px, 9999px, 80px, 0); }
    }
    @keyframes glitch-2 {
        0% { clip: rect(65px, 9999px, 100px, 0); } 20% { clip: rect(20px, 9999px, 50px, 0); }
        40% { clip: rect(80px, 9999px, 10px, 0); } 60% { clip: rect(10px, 9999px, 90px, 0); }
        80% { clip: rect(40px, 9999px, 30px, 0); } 100% { clip: rect(90px, 9999px, 60px, 0); }
    }

    .hero-sys-info {
        margin-top: 2rem; display: inline-flex; flex-wrap: wrap; justify-content: center; gap: 10px;
        font-family: var(--font-mono); font-size: 12px; color: var(--color-text-muted);
    }
    .badge {
        padding: 4px 12px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 6px;
    }
    .badge-value { color: var(--color-primary); font-weight: bold; }

    /* ==========================================================================
       [ FEATURE 12 ] TOOLBAR WITH MAGNETIC BUTTONS & SEARCH
       ========================================================================== */
    .toolbar {
        max-width: 1800px; margin: 0 auto 2rem; padding: 0 2rem;
        display: flex; justify-content: space-between; align-items: center;
    }
    .search-wrap { position: relative; width: 300px; }
    .search-input {
        width: 100%; background: var(--bg-panel); border: 1px solid var(--border-glass);
        border-radius: var(--radius-pill); padding: 10px 20px 10px 40px;
        color: var(--color-text-main); font-family: var(--font-ui); font-size: 14px;
        transition: var(--transition-smooth); outline: none; backdrop-filter: blur(10px);
    }
    .search-input:focus { border-color: var(--color-primary); box-shadow: var(--glow-primary); background: rgba(0,255,204,0.05); }
    .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--color-text-muted); }
    
    .btn-group { display: flex; gap: 8px; background: var(--bg-panel); padding: 4px; border-radius: var(--radius-pill); border: 1px solid var(--border-glass); }
    .btn-icon {
        background: transparent; border: none; padding: 8px; border-radius: 50%; color: var(--color-text-muted);
        transition: var(--transition-snap); display: flex; align-items: center; justify-content: center; position: relative;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--color-text-main); }
    .btn-icon.active { background: var(--color-primary); color: var(--bg-core); box-shadow: var(--glow-primary); }
    .btn-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

    /* ==========================================================================
       [ FEATURE 13 ] 3D TILT LAZY-LOADED GRID SYSTEM (NO CPU OVERLOAD)
       ========================================================================== */
    .grid {
        max-width: 1800px; margin: 0 auto; padding: 0 2rem;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 2rem;
        perspective: 2000px; transform-style: preserve-3d;
    }

    .node {
        height: 400px; background: var(--bg-panel); border-radius: var(--radius-lg);
        border: 1px solid var(--border-glass); display: flex; flex-direction: column;
        position: relative; overflow: hidden; transform-style: preserve-3d;
        transition: transform 0.1s ease, box-shadow var(--transition-smooth), border-color var(--transition-smooth);
        will-change: transform; opacity: 0; transform: translateY(40px) scale(0.95);
    }
    .node.revealed { opacity: 1; transform: translateY(0) scale(1); transition: opacity 0.6s, transform 0.6s cubic-bezier(0.2,0.8,0.2,1); }
    .node:hover { z-index: 10; box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,255,204,0.05); border-color: var(--color-primary); }

    /* Magic Border Gradient */
    .node::before {
        content: ''; position: absolute; inset: 0; border-radius: var(--radius-lg); padding: 2px;
        background: conic-gradient(from var(--angle, 0deg), transparent 70%, var(--color-primary) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; pointer-events: none;
        transition: opacity var(--transition-smooth);
    }
    .node:hover::before { opacity: 1; }

    /* Viewport Area */
    .node-view {
        flex: 1; margin: 15px 15px 0 15px; border-radius: var(--radius-md); background: #000;
        position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        transform: translateZ(30px); /* 3D Pop */
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    
    .node-iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity var(--transition-smooth); background: #050505; }
    .node-iframe.loaded { opacity: 1; filter: grayscale(20%) contrast(1.1); }
    .node:hover .node-iframe.loaded { filter: none; }

    /* Standby Overlay */
    .node-standby {
        position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(circle at center, #111, #020202); z-index: 2; transition: opacity var(--transition-smooth);
    }
    .node.is-running .node-standby { opacity: 0; pointer-events: none; }

    .node-icon-ring {
        width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: center; margin-bottom: 15px; position: relative;
    }
    .node-icon-ring::after {
        content: ''; position: absolute; inset: -5px; border-radius: 50%; border: 1px dashed var(--color-text-muted);
        animation: spin 10s linear infinite; opacity: 0.2;
    }
    .node:hover .node-icon-ring::after { border-color: var(--color-primary); opacity: 0.8; animation-duration: 3s; }
    .node-svg { width: 30px; height: 30px; fill: none; stroke: var(--color-text-muted); stroke-width: 1.5; transition: var(--transition-smooth); }
    .node:hover .node-svg { stroke: var(--color-primary); transform: scale(1.1); }

    .btn-init {
        background: rgba(0,255,204,0.1); border: 1px solid var(--border-glass); color: var(--color-primary);
        padding: 8px 20px; border-radius: var(--radius-pill); font-family: var(--font-mono); font-size: 11px;
        letter-spacing: 2px; text-transform: uppercase; transition: var(--transition-snap);
    }
    .btn-init:hover { background: var(--color-primary); color: var(--bg-core); box-shadow: var(--glow-primary); }
    .btn-init.kill { background: rgba(255,0,85,0.1); border-color: rgba(255,0,85,0.3); color: var(--color-alert); }
    .btn-init.kill:hover { background: var(--color-alert); color: #fff; box-shadow: var(--glow-alert); }

    /* Node Metadata */
    .node-meta {
        padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        border-bottom-left-radius: var(--radius-lg); border-bottom-right-radius: var(--radius-lg);
        position: relative; transform: translateZ(40px); /* 3D Pop */
    }
    .node-index {
        position: absolute; top: -15px; right: 20px; background: var(--bg-core); border: 1px solid var(--border-glass);
        padding: 4px 10px; border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 10px;
        color: var(--color-text-muted); box-shadow: 0 5px 10px rgba(0,0,0,0.5);
    }
    .node-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--color-primary); margin-bottom: 5px; display: block; font-weight: 700; }
    .node-name { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 8px; line-height: 1.2; }
    .node-desc { font-size: 13px; color: var(--color-text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Context Menu Trigger */
    .ctx-trigger {
        position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%;
        background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: var(--transition-smooth); border: 1px solid rgba(255,255,255,0.1); z-index: 50;
    }
    .node:hover .ctx-trigger { opacity: 1; }
    .ctx-trigger:hover { background: var(--color-primary); }
    .ctx-trigger:hover svg { stroke: var(--bg-core); }

    /* ==========================================================================
       [ FEATURE 14 ] CUSTOM CONTEXT MENU (OS Level)
       ========================================================================== */
    #ctx-menu {
        position: fixed; background: rgba(15, 20, 25, 0.95); border: 1px solid var(--border-glass);
        border-radius: var(--radius-md); padding: 8px 0; min-width: 200px; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        z-index: 100000; opacity: 0; pointer-events: none; transform: scale(0.95); transform-origin: top left;
        transition: opacity 0.1s, transform 0.1s; backdrop-filter: blur(20px); font-family: var(--font-ui);
    }
    #ctx-menu.show { opacity: 1; pointer-events: auto; transform: scale(1); }
    .ctx-item {
        padding: 10px 20px; font-size: 13px; color: var(--color-text-main); display: flex; align-items: center; gap: 12px;
        transition: 0.1s;
    }
    .ctx-item:hover { background: rgba(0, 255, 204, 0.1); color: var(--color-primary); }
    .ctx-item.danger:hover { background: rgba(255, 0, 85, 0.1); color: var(--color-alert); }
    .ctx-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0; }

    /* ==========================================================================
       [ FEATURE 15 ] TOAST NOTIFICATION SYSTEM
       ========================================================================== */
    #toaster { position: fixed; bottom: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast {
        background: rgba(10, 15, 20, 0.95); border: 1px solid var(--border-glass); border-left: 4px solid var(--color-primary);
        padding: 12px 20px; border-radius: var(--radius-sm); box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform var(--transition-spring);
        font-family: var(--font-mono); font-size: 12px; color: #fff; backdrop-filter: blur(10px); min-width: 300px;
    }
    .toast.show { transform: translateX(0); }
    .toast.err { border-left-color: var(--color-alert); }
    .toast.warn { border-left-color: var(--color-warn); }
    .toast-icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; }

    /* ==========================================================================
       [ FEATURE 16 ] OS MODAL ENGINE
       ========================================================================== */
    .modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
        z-index: 90000; display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity var(--transition-smooth);
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal-box {
        background: var(--bg-core); border: 1px solid var(--border-glass); border-radius: var(--radius-lg);
        width: 90%; max-width: 600px; padding: 40px; transform: translateY(30px) scale(0.95);
        transition: transform var(--transition-spring); box-shadow: 0 30px 60px rgba(0,0,0,0.8), var(--glow-primary);
        position: relative; overflow: hidden;
    }
    .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }
    .modal-close {
        position: absolute; top: 20px; right: 20px; background: transparent; border: none;
        color: var(--color-text-muted); padding: 8px; border-radius: 50%; transition: 0.2s;
    }

    .modal-body { font-size: 14px; color: var(--color-text-muted); line-height: 1.7; }

    .hw-graph { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

    /* ==========================================================================
       [ FEATURE 17 ] KEYFRAMES & UTILS
       ========================================================================== */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @keyframes rotate-angle { to { --angle: 360deg; } }
    .node:hover { animation: rotate-angle 3s linear infinite; }

    /* Text Colors */

    .tc-err { color: var(--color-alert); }
    .tc-warn { color: var(--color-warn); }
    .tc-succ { color: var(--color-success); }
</style>
</head>

<script>
/**
 * ULP V6 KERNEL
 * Written in Vanilla JS. No dependencies.
 * Features: Hardware detection, Audio synth, CLI, Memory management, Procedural graphics.

// ==========================================================================
// [ FEATURE 27 ] CONFIG & GLOBAL STATE
// ==========================================================================
const CONFIG = {

    maxRamIframes: 4, // Strict RAM limit governor
    themes: ['default', 'matrix', 'cyberpunk', 'retro', 'void', 'neon', 'arctic']

const STATE = {

    themeIdx: 0,

    mouse: { x: window.innerWidth/2, y: window.innerHeight/2 }
};

// ==========================================================================

// ==========================================================================
const NODE_DB = [
    { id: 'SYS-001', name: "Ice Age Engine", url: "https://jaapthind.github.io/IceAge/", type: "Physics_Node", icon: "i-game", desc: "Cryogenic logic testing facility. Native collision." },

    { id: 'SYS-003', name: "FelixFart Audio", url: "https://jaapthind.github.io/FelixFart/", type: "Acoustic_Test", icon: "i-audio", desc: "Acoustic resonance warning. Extreme caution." }
];

// Procedural generation to hit 100 nodes for massive scale
const prefixes = ['Quantum', 'Neural', 'Cyber', 'Void', 'Plasma', 'Aero', 'Crypto', 'Synth'];
const suffixes = ['Matrix', 'Core', 'Relay', 'Node', 'Grid', 'Link', 'Hub', 'Engine'];
const icons = ['i-database', 'i-code', 'i-shield', 'i-target', 'i-drone', 'i-server'];

for (let i = 4; i <= CONFIG.totalNodes; i++) {
    const p = prefixes[Math.floor(Math.random() * prefixes.length)];
    const s = suffixes[Math.floor(Math.random() * suffixes.length)];
    const icn = icons[Math.floor(Math.random() * icons.length)];
    NODE_DB.push({
        id: `SYS-${String(i).padStart(3, '0')}`,

        url: `about:blank#unallocated-${i}`,
        type: "Memory_Sector",
        icon: icn,
        desc: `Unallocated logical sector. Ready for data injection sequence.`
    });
}

// ==========================================================================
// [ FEATURE 29 ] PROCEDURAL AUDIO SYNTHESIZER (No external MP3s needed)
// ==========================================================================
class AudioEngine {
    constructor() {
        this.ctx = null;
        this.enabled = false;
        // Init on first user interaction to bypass browser autoplay blocks
        document.body.addEventListener('click', () => this.init(), { once: true });
        document.body.addEventListener('keydown', () => this.init(), { once: true });
    }

    init() {
        if(this.ctx) return;
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.enabled = true;
        } catch(e) { console.warn("Audio disabled"); }
    }

    play(type) {
        if(!this.enabled || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        const now = this.ctx.currentTime;
        
        switch(type) {
            case 'hover': // [ FEATURE 30 ] Hover sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.05);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
                break;
            case 'click': // [ FEATURE 31 ] Click sound
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
                break;
            case 'error': // [ FEATURE 32 ] Error sound
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
                break;
            case 'success': // [ FEATURE 33 ] Success sound
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
                break;
        }
    }
}
const Synth = new AudioEngine();


// ==========================================================================
// [ FEATURE 34 ] HARDWARE DETECTION ENGINE
// ==========================================================================
class HardwareDetector {
    constructor() {
        this.data = {
            cores: navigator.hardwareConcurrency || 'Unknown',
            ram: navigator.deviceMemory || 'Unknown',
            os: this.detectOS(),
            browser: this.detectBrowser(),
            gpu: 'Detecting...',
            net: 'Unknown',
            battery: 'Unknown'
        };
        this.init();
    }

    async init() {
        this.detectGPU();
        this.detectNetwork();
        await this.detectBattery();
        this.updateDOM();
    }

    // [ FEATURE 35 ] OS Detection
    detectOS() {
        const ua = navigator.userAgent;
        if (ua.includes("Win")) return "Windows";
        if (ua.includes("Mac")) return "macOS";
        if (ua.includes("Linux")) return "Linux";
        if (ua.includes("Android")) return "Android";
        if (ua.includes("iPhone") || ua.includes("iPad")) return "iOS";
        return "Unknown OS";
    }

    // [ FEATURE 36 ] Browser Detection
    detectBrowser() {
        const ua = navigator.userAgent;
        if (ua.includes("Chrome")) return "Chrome/Blink";
        if (ua.includes("Firefox")) return "Firefox/Gecko";
        if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari/WebKit";
        return "Browser";
    }

    // [ FEATURE 37 ] WebGL GPU Detection (Unmasked Renderer)
    detectGPU() {
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                const ext = gl.getExtension('WEBGL_debug_renderer_info');
                if (ext) {
                    this.data.gpu = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
                } else {
                    this.data.gpu = "WebGL Supported (Hidden)";
                }
            } else {
                this.data.gpu = "No WebGL";
            }
        } catch(e) { this.data.gpu = "Error detecting GPU"; }
    }

    // [ FEATURE 38 ] Network API Integration
    detectNetwork() {
        if (navigator.connection) {
            this.data.net = `${navigator.connection.effectiveType} (${navigator.connection.downlink}Mbps)`;
            navigator.connection.addEventListener('change', () => {
                this.data.net = `${navigator.connection.effectiveType} (${navigator.connection.downlink}Mbps)`;
                this.updateDOM();
            });
        }
    }

    // [ FEATURE 39 ] Battery API Integration
    async detectBattery() {
        if (navigator.getBattery) {
            try {
                const bat = await navigator.getBattery();
                const updateBat = () => {
                    this.data.battery = `${Math.round(bat.level * 100)}% ${bat.charging ? '⚡' : ''}`;
                    document.getElementById('hw-bat-txt').innerText = this.data.battery;
                };
                updateBat();
                bat.addEventListener('levelchange', updateBat);
                bat.addEventListener('chargingchange', updateBat);
            } catch(e) {}
        }
    }

    updateDOM() {
        document.getElementById('badge-cores').innerText = this.data.cores;
        document.getElementById('badge-ram').innerText = this.data.ram;
        document.getElementById('badge-os').innerText = this.data.os;
        document.getElementById('badge-net').innerText = this.data.net;
        document.getElementById('hw-gpu-txt').innerText = this.data.gpu;
    }
}
const HW = new HardwareDetector();


// ==========================================================================
// [ FEATURE 40 ] UI MANAGER (Toasts, Modals, Menus)
// ==========================================================================
class UI {
    static toast(msg, type='info') {
        const c = document.getElementById('toaster');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        let icon = '#i-alert';
        if(type==='err') { icon = '#i-close'; Synth.play('error'); }
        else if(type==='warn') icon = '#i-settings';
        else Synth.play('success');

        t.innerHTML = `<svg class="toast-icon"><use href="${icon}"></use></svg> <span>${msg}</span>`;
        c.appendChild(t);
        
        requestAnimationFrame(() => t.classList.add('show'));
        setTimeout(() => {
            t.classList.remove('show');
            setTimeout(() => t.remove(), 600);
        }, 3000);
    }

    static showModal() {
        const m = document.getElementById('sys-modal');
        const body = document.getElementById('sys-modal-body');
        body.innerHTML = `
            <p><strong class="tc-pri">USER_AGENT:</strong> <span style="word-wrap:break-word;">${navigator.userAgent}</span></p>
            <p><strong class="tc-pri">LOGICAL_CORES:</strong> ${HW.data.cores}</p>
            <p><strong class="tc-pri">DEVICE_MEMORY:</strong> ~${HW.data.ram} GB</p>
            <p><strong class="tc-pri">GRAPHICS_UNIT:</strong> ${HW.data.gpu}</p>
            <p><strong class="tc-pri">NETWORK_LINK:</strong> ${HW.data.net}</p>
            <p><strong class="tc-pri">SCREEN_RES:</strong> ${window.screen.width}x${window.screen.height}</p>
        `;
        
        // [ FEATURE 41 ] Animated modal graph
        const graph = document.getElementById('modal-graph');
        graph.innerHTML = '';
        for(let i=0; i<20; i++) {
            const bar = document.createElement('div');
            bar.className = 'graph-bar';
            bar.style.height = `${Math.random() * 100}%`;
            graph.appendChild(bar);
        }
        
        m.classList.add('show');
        Synth.play('click');
        
        // Animate graph
        UI.graphInterval = setInterval(() => {
            Array.from(graph.children).forEach(bar => {
                bar.style.height = `${Math.random() * 100}%`;
            });
        }, 500);
    }

    static hideModal() {
        document.getElementById('sys-modal').classList.remove('show');
        clearInterval(UI.graphInterval);
        Synth.play('click');
    }

    static cycleTheme() {
        STATE.themeIdx = (STATE.themeIdx + 1) % CONFIG.themes.length;
        const t = CONFIG.themes[STATE.themeIdx];
        if(t === 'default') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', t);
        UI.toast(`Theme updated to: ${t.toUpperCase()}`);
        Synth.play('click');
    }

    // [ FEATURE 42 ] Context Menu Logic
    static showCtx(e, id) {
        e.preventDefault();
        STATE.ctxTarget = id;
        const menu = document.getElementById('ctx-menu');
        menu.classList.add('show');
        
        let x = e.clientX; let y = e.clientY;
        const bounds = menu.getBoundingClientRect();
        if(x + bounds.width > window.innerWidth) x -= bounds.width;
        if(y + bounds.height > window.innerHeight) y -= bounds.height;
        
        menu.style.left = `${x}px`;
        menu.style.top = `${y}px`;
        Synth.play('click');
    }

    static hideCtx() {
        document.getElementById('ctx-menu').classList.remove('show');
        STATE.ctxTarget = null;
    }
}


// ==========================================================================
// [ FEATURE 43 ] DRAGGABLE WINDOW MANAGER (CLI Terminal)
// ==========================================================================
class WindowManager {
    constructor() {
        this.win = document.getElementById('terminal-window');
        this.handle = document.getElementById('term-drag');
        this.isDragging = false;
        this.offset = { x:0, y:0 };
        this.pos = { x:20, y:60 }; // Init pos

        this.handle.addEventListener('mousedown', this.startDrag.bind(this));
        window.addEventListener('mousemove', this.drag.bind(this));
        window.addEventListener('mouseup', this.stopDrag.bind(this));
    }

    startDrag(e) {
        this.isDragging = true;
        const rect = this.win.getBoundingClientRect();
        this.offset.x = e.clientX - rect.left;
        this.offset.y = e.clientY - rect.top;
        this.win.style.transition = 'none'; // Disable transition for smooth drag
    }

    drag(e) {
        if(!this.isDragging) return;
        this.pos.x = e.clientX - this.offset.x;
        this.pos.y = e.clientY - this.offset.y;
        
        // Bounds check
        if(this.pos.x < 0) this.pos.x = 0;
        if(this.pos.y < 40) this.pos.y = 40; // taskbar height
        if(this.pos.x + this.win.offsetWidth > window.innerWidth) this.pos.x = window.innerWidth - this.win.offsetWidth;
        if(this.pos.y + this.win.offsetHeight > window.innerHeight) this.pos.y = window.innerHeight - this.win.offsetHeight;

        this.win.style.left = `${this.pos.x}px`;
        this.win.style.top = `${this.pos.y}px`;
        this.win.style.transform = `none`; // Override centering transform
    }

    stopDrag() {
        this.isDragging = false;
        this.win.style.transition = ''; // Restore transitions
    }

    toggle() {
        this.win.classList.toggle('active');
        if(this.win.classList.contains('active')) {
            document.getElementById('term-input').focus();
            Synth.play('click');
        }
    }
}
const WinMgr = new WindowManager();


// ==========================================================================
// [ FEATURE 44 ] ADVANCED CLI LOGIC WITH 15+ COMMANDS
// ==========================================================================
class CLI {
    constructor() {
        this.input = document.getElementById('term-input');
        this.out = document.getElementById('term-output');
        
        // [ FEATURE 45 - 55 ] Extensive Command Library
        this.cmds = {
            'help': () => this.print("Cmds: help, clear, sys, theme, ls, kill [id], reboot, ping, sudo, matrix, date, echo"),
            'clear': () => { this.out.innerHTML = ''; },
            'sys': () => this.print(`OS: ULP V6<br>CPU: ${HW.data.cores} Cores<br>RAM: ~${HW.data.ram}GB<br>GPU: ${HW.data.gpu}`),
            'theme': () => { UI.cycleTheme(); this.print("Theme mutated."); },
            'ls': () => {
                if(STATE.activePIDs.size === 0) return this.print("No active processes.");
                let s = "PIDs:<br>";
                STATE.activePIDs.forEach((url, id) => s += `<span class="tc-pri">${id}</span> -> ${url}<br>`);
                this.print(s);
            },
            'kill': (args) => {
                if(!args[0]) return this.print("Usage: kill [id] (e.g. kill SYS-001)", 'err');
                const id = args[0].toUpperCase();
                if(STATE.activePIDs.has(id)) {
                    Grid.kill(id);
                    this.print(`Process ${id} terminated.`);
                } else this.print(`PID ${id} not found.`, 'err');
            },
            'reboot': () => { this.print("Rebooting..."); setTimeout(()=>location.reload(), 1000); },
            'ping': () => this.print(`Pong. ${Math.floor(Math.random()*20+5)}ms`),
            'sudo': () => this.print("Nice try. This incident will be reported.", 'err'),
            'matrix': () => { document.documentElement.setAttribute('data-theme', 'matrix'); this.print("Follow the white rabbit."); },
            'date': () => this.print(new Date().toString()),
            'echo': (args) => this.print(args.join(' ')),
            // Easter eggs
            'do a barrel roll': () => { document.body.style.transition="1s"; document.body.style.transform="rotate(360deg)"; setTimeout(()=>{document.body.style.transition=""; document.body.style.transform="";}, 1000); this.print("Whoa!"); },
            'rm -rf /': () => this.print("Permission denied. Safeguard active.", 'err')
        };

        this.input.addEventListener('keydown', e => {
            if(e.key === 'Enter') {
                const val = this.input.value.trim();
                if(val) this.process(val);
                this.input.value = '';
            }
        });
    }

    print(html, isErr=false) {
        const d = document.createElement('div');
        d.className = 'term-line';
        if(isErr) d.classList.add('tc-err');
        d.innerHTML = html;
        this.out.appendChild(d);
        this.out.scrollTop = this.out.scrollHeight;
    }

    process(raw) {
        this.print(`<span class="tc-succ">user@sys</span><span class="tc-sec">~$</span> ${raw}`);
        const parts = raw.split(' ');
        const cmd = parts[0].toLowerCase();
        const args = parts.slice(1);
        
        if(this.cmds[cmd]) this.cmds[cmd](args);
        else this.print(`bash: ${cmd}: command not found`, true);
    }
}
const Terminal = new CLI();


// ==========================================================================
// [ FEATURE 56 ] GRID MANAGER (LAZY LOAD, VIRTUALIZATION, DOM INJECTION)
// ==========================================================================
class GridEngine {
    constructor() {
        this.container = document.getElementById('main-grid');
        this.build();
    }

    build() {
        const frag = document.createDocumentFragment();
        
        NODE_DB.forEach((n, i) => {
            const el = document.createElement('article');
            el.className = 'node';
            el.dataset.id = n.id;
            el.dataset.name = n.name.toLowerCase();
            
            const isPh = n.url.includes('about:blank');
            const btnCls = isPh ? 'kill' : '';
            const btnTxt = isPh ? 'ALLOCATE' : 'INITIALIZE';

            el.innerHTML = `
                <div class="ctx-trigger" title="Options"><svg class="tb-icon"><use href="#i-more"></use></svg></div>
                <div class="node-view">
                    <div class="node-standby">
                        <div class="node-icon-ring"><svg class="node-svg"><use href="#${n.icon}"></use></svg></div>
                        <button class="btn-init ${btnCls}">${btnTxt}</button>
                    </div>
                    <iframe data-url="${n.url}" src="about:blank" tabindex="-1" class="node-iframe"></iframe>
                </div>
                <div class="node-meta">
                    <div class="node-index">${n.id}</div>
                    <span class="node-cat">${n.type}</span>
                    <h2 class="node-name">${n.name}</h2>
                    <p class="node-desc">${n.desc}</p>
                </div>
            `;
            
            // Interaction bindings
            el.addEventListener('mouseenter', () => Synth.play('hover'));
            
            const initBtn = el.querySelector('.btn-init');
            initBtn.addEventListener('click', () => this.toggle(n.id, el));
            
            const ctxBtn = el.querySelector('.ctx-trigger');
            ctxBtn.addEventListener('click', (e) => { e.stopPropagation(); UI.showCtx(e, n.id); });
            el.addEventListener('contextmenu', (e) => { e.preventDefault(); UI.showCtx(e, n.id); });

            frag.appendChild(el);
        });

        this.container.appendChild(frag);
        
        // [ FEATURE 57 ] Intersection Observer to save paint cycles
        const io = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting) e.target.classList.add('revealed');
            });
        }, { rootMargin: '100px' });
        
        document.querySelectorAll('.node').forEach(n => io.observe(n));
    }

    // [ FEATURE 58 ] RAM Governor Logic
    toggle(id, el) {
        const node = NODE_DB.find(n => n.id === id);
        if(node.url.includes('about:blank')) {
            UI.toast('Memory sector unallocated. Bypass required.', 'err');
            return;
        }

        const iframe = el.querySelector('.node-iframe');
        const isActive = el.classList.contains('is-running');

        if(!isActive) {
            if(STATE.activePIDs.size >= CONFIG.maxRamIframes) {
                UI.toast(`RAM GOVERNOR: Max limit (${CONFIG.maxRamIframes}) reached. Kill a process.`, 'err');
                return;
            }
            
            el.classList.add('is-running');
            iframe.src = node.url;
            STATE.activePIDs.set(id, node.url);
            
            setTimeout(() => iframe.classList.add('loaded'), 500);
            UI.toast(`Process ${id} mounted successfully.`);
            Synth.play('success');
            
        } else {
            this.kill(id, el);
        }
    }

    kill(id, el=null) {
        if(!el) el = document.querySelector(`.node[data-id="${id}"]`);
        if(!el) return;
        
        const iframe = el.querySelector('.node-iframe');
        iframe.classList.remove('loaded');
        el.classList.remove('is-running');
        STATE.activePIDs.delete(id);
        
        // Delay src removal for smooth fade out
        setTimeout(() => {
            iframe.src = 'about:blank';
            UI.toast(`Process ${id} killed. Memory freed.`);
        }, 300);
    }

    filter(q) {
        const query = q.toLowerCase();
        document.querySelectorAll('.node').forEach(el => {
            if(el.dataset.name.includes(query) || el.dataset.id.toLowerCase().includes(query)) {
                el.style.display = 'flex';
            } else {
                el.style.display = 'none';
            }
        });
    }
}
const Grid = new GridEngine();

// [ FEATURE 60 ] LOW-IMPACT CANVAS PARTICLE ENGINE
// ==========================================================================
class ParticleSystem {
    constructor() {
        this.c = document.getElementById('ambient-canvas');
        this.ctx = this.c.getContext('2d', { alpha: false }); // Optimize
        this.particles = [];
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        for(let i=0; i<40; i++) {
            this.particles.push({
                x: Math.random() * this.w,
                y: Math.random() * this.h,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                s: Math.random() * 2 + 1
            });
        }
        this.animate();
    }
    resize() {
        this.w = this.c.width = window.innerWidth;
        this.h = this.c.height = window.innerHeight;
    }
    animate() {
        // Clear with slight trail
        this.ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-core').trim();
        this.ctx.fillRect(0, 0, this.w, this.h);
        
        const priColor = getComputedStyle(document.body).getPropertyValue('--color-primary').trim();
        this.ctx.fillStyle = priColor;
        
        this.particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > this.w) p.vx *= -1;
            if(p.y < 0 || p.y > this.h) p.vy *= -1;
            
            // Repel from mouse
            const dx = STATE.mouse.x - p.x;
            const dy = STATE.mouse.y - p.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 100) {
                p.x -= (dx/dist) * 2;
                p.y -= (dy/dist) * 2;
            }
            
            this.ctx.globalAlpha = 0.5;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
            this.ctx.fill();
        });
        requestAnimationFrame(() => this.animate());
    }
}
// Init after short delay to prioritize UI load
setTimeout(() => new ParticleSystem(), 1000);

// [ FEATURE 61 - 67 ] GLOBAL EVENTS, CURSOR PHYSICS & EASTER EGGS
// ==========================================================================
document.addEventListener('DOMContentLoaded', () => {
    
    // Hardware Cursor Physics
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let rx = window.innerWidth/2, ry = window.innerHeight/2;
    
    window.addEventListener('mousemove', e => {
        STATE.mouse.x = e.clientX;
        STATE.mouse.y = e.clientY;
        dot.style.left = `${e.clientX}px`;
        dot.style.top = `${e.clientY}px`;
    });

    function animCursor() {
        rx += (STATE.mouse.x - rx) * 0.2;
        ry += (STATE.mouse.y - ry) * 0.2;
        ring.style.left = `${rx}px`;
        ring.style.top = `${ry}px`;
        requestAnimationFrame(animCursor);
    }
    animCursor();

    // Hover states for custom cursor
    document.querySelectorAll('button, .interactive, .ctx-trigger, .ctx-item, input').forEach(el => {
        el.addEventListener('mouseenter', () => document.body.classList.add(el.tagName==='INPUT'?'typing':'hovering'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('hovering', 'typing'));
    });

    // Toolbar logic
    document.getElementById('btn-cli').addEventListener('click', () => WinMgr.toggle());
    document.getElementById('btn-close-cli').addEventListener('click', () => WinMgr.toggle());
    document.getElementById('btn-info').addEventListener('click', () => UI.showModal());
    document.getElementById('btn-close-modal').addEventListener('click', () => UI.hideModal());
    document.getElementById('theme-toggle').addEventListener('click', () => UI.cycleTheme());
    document.getElementById('btn-reboot').addEventListener('click', () => {
        UI.toast('Rebooting kernel...', 'warn');
        setTimeout(()=>location.reload(), 500);
    });

    // View toggles
    const vGrid = document.getElementById('view-grid');
    const vList = document.getElementById('view-list');
    const mainGrid = document.getElementById('main-grid');
    
    vGrid.addEventListener('click', () => { vGrid.classList.add('active'); vList.classList.remove('active'); mainGrid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(360px, 1fr))'; Synth.play('click'); });
    vList.addEventListener('click', () => { vList.classList.add('active'); vGrid.classList.remove('active'); mainGrid.style.gridTemplateColumns = '1fr'; Synth.play('click'); });

    // Search
    let searchTimer;
    document.getElementById('node-search').addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => Grid.filter(e.target.value), 200);
    });

    // Context Menu Actions
    document.addEventListener('click', () => UI.hideCtx());
    
    document.getElementById('ctx-new-tab').addEventListener('click', () => {
        if(!STATE.ctxTarget) return;
        const n = NODE_DB.find(x => x.id === STATE.ctxTarget);
        if(n && !n.url.includes('about:blank')) window.open(n.url, '_blank');
        else UI.toast('Sector void.', 'err');
    });
    
    document.getElementById('ctx-copy').addEventListener('click', () => {
        if(!STATE.ctxTarget) return;
        const n = NODE_DB.find(x => x.id === STATE.ctxTarget);
        navigator.clipboard.writeText(n.url);
        UI.toast('URL Copied.');
    });
    
    document.getElementById('ctx-details').addEventListener('click', () => {
        if(!STATE.ctxTarget) return;
        Terminal.process(`ls | grep ${STATE.ctxTarget}`);
        if(!document.getElementById('terminal-window').classList.contains('active')) WinMgr.toggle();
    });

    document.getElementById('ctx-kill').addEventListener('click', () => {
        if(!STATE.ctxTarget) return;
        if(STATE.activePIDs.has(STATE.ctxTarget)) Grid.kill(STATE.ctxTarget);
        else UI.toast('Process not running.', 'warn');
    });

    // Easter Egg: Konami Code
    const konami = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    window.addEventListener('keydown', e => {
        if(e.key === konami[STATE.konamiProgress]) {
            STATE.konamiProgress++;
            if(STATE.konamiProgress === konami.length) {
                UI.toast('GOD MODE UNLOCKED. RAM GOVERNOR DISABLED.', 'warn');

                STATE.konamiProgress = 0;
            }
