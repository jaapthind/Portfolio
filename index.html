<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jaap's High-Performance Liquid Grid</title>
<style>
    /* ==========================================================================
       CORE VARIABLES & RESET
       ========================================================================== */
    :root {
        --bg-dark: #02050a;
        --accent-glow: #00ffcc;
        --glass-bg: rgba(10, 15, 25, 0.4);
        --glass-border: rgba(0, 255, 204, 0.15);
        --text-main: #e0fbfc;
        --text-sub: #8d99ae;
        --card-radius: 20px;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none; /* Custom cursor */
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
        /* Hardware acceleration hint */
        transform: translateZ(0); 
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: rgba(0, 255, 204, 0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0, 255, 204, 0.6); }

    /* ==========================================================================
       GPU-OPTIMIZED BACKGROUND (No Canvas, Pure CSS Math)
       ========================================================================== */
    .bg-mesh {
        position: fixed;
        inset: 0;
        z-index: -2;
        background-image: 
            radial-gradient(at 0% 0%, rgba(0, 255, 204, 0.08) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(138, 43, 226, 0.08) 0px, transparent 50%);
        background-attachment: fixed;
        background-size: 100vw 100vh;
    }

    .bg-grid {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image: 
            linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
        transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
        animation: gridMove 20s linear infinite;
        pointer-events: none;
    }

    @keyframes gridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
    }

    /* ==========================================================================
       HEADER & TYPOGRAPHY
       ========================================================================== */
    .header-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 6rem 2rem 4rem;
        text-align: center;
        position: relative;
    }

    .title-glitch {
        font-size: clamp(3rem, 6vw, 6rem);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: transparent;
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.5);
        position: relative;
        display: inline-block;
    }

    .title-glitch::before, .title-glitch::after {
        content: 'JAAP OS v4';
        position: absolute;
        top: 0; left: 0; right: 0;
        color: var(--accent-glow);
        -webkit-text-stroke: 0;
        overflow: hidden;
    }

    .title-glitch::before {
        left: 3px;
        text-shadow: -2px 0 red;
        animation: glitch-anim 3s infinite linear alternate-reverse;
        clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
    }

    .title-glitch::after {
        left: -3px;
        text-shadow: -2px 0 blue;
        animation: glitch-anim 2s infinite linear alternate-reverse;
        clip-path: polygon(0 66%, 100% 66%, 100% 100%, 0 100%);
    }

    @keyframes glitch-anim {
        0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 2px); }
        20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -2px); }
        40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 1px); }
        60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -1px); }
        80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 2px); }
        100% { clip-path: inset(30% 0 50% 0); transform: translate(1px, -2px); }
    }

    .subtitle {
        margin-top: 1rem;
        font-size: 1.1rem;
        color: var(--text-sub);
        max-width: 600px;
        line-height: 1.6;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .status-bar {
        margin-top: 2rem;
        display: flex;
        gap: 20px;
        font-family: monospace;
        font-size: 0.85rem;
        color: var(--accent-glow);
        background: rgba(0, 255, 204, 0.05);
        padding: 8px 20px;
        border-radius: 30px;
        border: 1px solid rgba(0, 255, 204, 0.2);
    }

    .status-dot {
        display: inline-block;
        width: 8px; height: 8px;
        background: var(--accent-glow);
        border-radius: 50%;
        margin-right: 8px;
        animation: blink 2s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ==========================================================================
       MAIN GRID SYSTEM
       ========================================================================== */
    .dashboard {
        max-width: 1800px;
        margin: 0 auto;
        padding: 2rem;
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 2rem;
        /* Hardware accelerate grid layout */
        will-change: transform;
    }

    /* ==========================================================================
       LAZY-LOADED LIQUID CARDS (Optimized for low RAM)
       ========================================================================== */
    .node-card {
        height: 380px;
        position: relative;
        background: var(--glass-bg);
        border-radius: var(--card-radius);
        border: 1px solid var(--glass-border);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s;
        /* Tell browser this element will change to optimize paint */
        will-change: transform, box-shadow;
    }

    .node-card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 15px 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 255, 204, 0.1);
        border-color: rgba(0, 255, 204, 0.4);
        z-index: 10;
    }

    /* Liquid Edge Glow (CSS Only, no SVG/Filters to save CPU) */
    .node-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--card-radius);
        padding: 2px;
        background: conic-gradient(from var(--border-angle, 0deg), transparent 70%, var(--accent-glow) 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
    }

    .node-card:hover::before {
        opacity: 1;
        /* We animate CSS variable via JS or @property if supported, fallback is static */
    }

    /* Embedded Viewport */
    .viewport {
        flex: 1;
        margin: 15px 15px 0 15px;
        border-radius: 12px;
        background: #0a0a0a;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .viewport iframe {
        width: 100%;
        height: 100%;
        border: none;
        opacity: 0;
        transition: opacity 0.5s ease;
        /* Hardware accelerate iframe rendering */
        transform: translateZ(0); 
    }

    .viewport iframe.active {
        opacity: 1;
    }

    /* Standby UI (Shown when iframe is killed) */
    .standby-ui {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: repeating-linear-gradient(45deg, #050505, #050505 10px, #0a0a0a 10px, #0a0a0a 20px);
        z-index: 2;
        transition: opacity 0.3s;
    }

    .node-card:hover .standby-ui {
        opacity: 0;
        pointer-events: none;
    }

    .icon-container {
        width: 60px; height: 60px;
        border-radius: 50%;
        border: 2px dashed rgba(0, 255, 204, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
        animation: spin 10s linear infinite;
    }

    .icon-container svg {
        width: 24px; height: 24px;
        fill: none;
        stroke: var(--text-sub);
        stroke-width: 2;
        animation: spin 10s linear infinite reverse; /* Keep icon upright */
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    .standby-text {
        font-family: monospace;
        font-size: 0.8rem;
        color: var(--text-sub);
        letter-spacing: 1px;
    }

    /* Card Metadata */
    .meta-data {
        padding: 20px;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        border-bottom-left-radius: var(--card-radius);
        border-bottom-right-radius: var(--card-radius);
        position: relative;
        z-index: 5;
    }

    .meta-index {
        position: absolute;
        top: -15px; right: 20px;
        background: var(--bg-dark);
        border: 1px solid var(--glass-border);
        color: var(--text-sub);
        font-family: monospace;
        font-size: 0.7rem;
        padding: 4px 8px;
        border-radius: 10px;
    }

    .meta-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 5px;
    }

    .meta-desc {
        font-size: 0.85rem;
        color: var(--text-sub);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* Memory Gauge Indicator */
    .mem-gauge {
        width: 100%;
        height: 3px;
        background: rgba(255,255,255,0.1);
        margin-top: 10px;
        border-radius: 2px;
        overflow: hidden;
    }

    .mem-fill {
        height: 100%;
        width: 0%;
        background: var(--accent-glow);
        transition: width 0.3s;
    }

    .node-card:hover .mem-fill { width: 100%; }

    /* ==========================================================================
       CUSTOM HARDWARE CURSOR
       ========================================================================== */
    .cursor-wrapper {
        position: fixed;
        top: 0; left: 0;
        pointer-events: none;
        z-index: 10000;
    }

    .cursor-core {
        position: absolute;
        width: 6px; height: 6px;
        background: #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.2s, height 0.2s;
    }

    .cursor-ring {
        position: absolute;
        width: 30px; height: 30px;
        border: 1px solid var(--accent-glow);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: transform 0.1s ease-out, width 0.2s, height 0.2s;
        /* GPU acceleration for cursor */
        will-change: transform;
    }

    body.hovering .cursor-core { width: 0; height: 0; }
    body.hovering .cursor-ring {
        width: 50px; height: 50px;
        background: rgba(0, 255, 204, 0.1);
        border-color: rgba(0, 255, 204, 0.5);
    }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="cursor-wrapper" id="cursorBox">
    <div class="cursor-ring" id="cRing"></div>
    <div class="cursor-core" id="cCore"></div>
</div>

<header class="header-container">
    <div class="title-glitch" data-text="JAAP OS v4">JAAP OS v4</div>
    <p class="subtitle">Dynamic Resource Allocation Grid. Embedded nodes remain dormant until requested to preserve system RAM.</p>
    <div class="status-bar">
        <span><span class="status-dot"></span>SYS: OPTIMAL</span>
        <span id="ram-tracker">RAM ALLOCATION: 0%</span>
        <span>NODES: 50</span>
    </div>
</header>

<main class="dashboard">
    <div class="grid-container" id="node-grid">
        </div>
</main>

<script>
    /* ==========================================================================
       DATA STRUCTURE
       ========================================================================== */
    const nodeData = [
        { title: "Ice Age Protocol", url: "https://jaapthind.github.io/IceAge/", desc: "Cryogenic physics simulation. Native collision mechanics.", icon: "box" },
        { title: "Jaaper Dropper", url: "https://jaapthind.github.io/JaaperDropper/", desc: "Gravity-based timing mechanism. Difficulty scales exponentially.", icon: "target" },
        { title: "FelixFart Audio", url: "https://jaapthind.github.io/FelixFart/", desc: "Acoustic resonance testing facility. Caution advised.", icon: "speaker" }
        
    ];

    // Generate remainder to hit 50 exactly
    for(let i = 15; i < 50; i++) {
        nodeData.push({
            title: `Sector ${i + 1} Null`,
            url: `PLACEHOLDER_${i+1}`,
            desc: "Unallocated memory sector. Awaiting directive.",
            icon: "database"
        });
    }

    /* ==========================================================================
       SVG ICON LIBRARY (Injected inline to avoid external requests)
       ========================================================================== */
    const icons = {
        box: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>',
        target: '<circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>',
        speaker: '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>',
        shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>',
        code: '<polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline>',
        crosshair: '<circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line>',
        camera: '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle>',
        blueprint: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line>',
        globe: '<circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>',
        terminal: '<polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>',
        activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>',
        drone: '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>',
        chart: '<line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>',
        timer: '<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',
        map: '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line>',
        database: '<ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>'
    };

    /* ==========================================================================
       DOM BUILDER (Efficient Rendering)
       ========================================================================== */
    const gridEl = document.getElementById('node-grid');
    const ramTracker = document.getElementById('ram-tracker');
    let activeNodes = 0;

    // Build DocumentFragment to inject all 50 cards at once (Massive performance gain over innerHTML loop)
    const fragment = document.createDocumentFragment();

    nodeData.forEach((data, index) => {
        const card = document.createElement('a');
        card.href = data.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.className = "node-card interactive-node";
        
        // Use default icon if specified one doesn't exist
        const svgPath = icons[data.icon] || icons['database'];

        card.innerHTML = `
            <div class="viewport">
                <div class="standby-ui">
                    <div class="icon-container">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${svgPath}</svg>
                    </div>
                    <div class="standby-text">AWAITING WAKE</div>
                </div>
                <iframe data-src="${data.url}" src="about:blank" tabindex="-1"></iframe>
            </div>
            <div class="meta-data">
                <div class="meta-index">N-${String(index + 1).padStart(2, '0')}</div>
                <div class="meta-title">${data.title}</div>
                <div class="meta-desc">${data.desc}</div>
                <div class="mem-gauge"><div class="mem-fill"></div></div>
            </div>
        `;

        // POWER MANAGEMENT: Smart Iframe Loading
        // Instead of loading 50 sites, we swap 'about:blank' for the real URL ONLY on hover
        const iframe = card.querySelector('iframe');
        const targetUrl = data.url;
        const isPlaceholder = targetUrl.includes('PLACEHOLDER');

        card.addEventListener('mouseenter', () => {
            if (!isPlaceholder) {
                iframe.src = targetUrl;
                iframe.classList.add('active');
                activeNodes++;
                updateRamUI();
            }
        });

        card.addEventListener('mouseleave', () => {
            if (!isPlaceholder) {
                // Instantly free memory by clearing the src
                iframe.src = 'about:blank'; 
                iframe.classList.remove('active');
                activeNodes = Math.max(0, activeNodes - 1);
                updateRamUI();
            }
        });

        fragment.appendChild(card);
    });

    gridEl.appendChild(fragment);

    function updateRamUI() {
        // Fake RAM calculation based on how many iframes are currently spinning up
        const usage = (activeNodes / 50) * 100;
        ramTracker.innerText = `RAM ALLOCATION: ${usage.toFixed(1)}%`;
        if (usage > 5) {
            ramTracker.style.color = '#ffaa00';
        } else {
            ramTracker.style.color = 'var(--accent-glow)';
        }
    }

    /* ==========================================================================
       CUSTOM HARDWARE-ACCELERATED CURSOR ENGINE
       ========================================================================== */
    const cBox = document.getElementById('cursorBox');
    const cRing = document.getElementById('cRing');
    
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let ringX = mouseX;
    let ringY = mouseY;

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        // Core follows instantly (CSS transform)
        cBox.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
    });

    // Spring physics for outer ring
    function animCursor() {
        // calculate distance
        const dx = mouseX - ringX;
        const dy = mouseY - ringY;
        
        // add spring tension
        ringX += dx * 0.2;
        ringY += dy * 0.2;
        
        // Use transform relative to the already translated container
        cRing.style.transform = `translate(${ringX - mouseX}px, ${ringY - mouseY}px) translate(-50%, -50%)`;
        
        requestAnimationFrame(animCursor);
    }
    requestAnimationFrame(animCursor);

    // Hover state management
    document.querySelectorAll('.interactive-node').forEach(node => {
        node.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
        node.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });

    /* ==========================================================================
       SUBTLE CARD BORDER ANIMATION (Low CPU alternative to SVG masks)
       ========================================================================== */
    // Instead of complex CSS animations, we update a custom property based on time
    // Only runs if browser supports CSS.registerProperty, otherwise gracefully degrades
    if (window.CSS && CSS.registerProperty) {
        try {
            CSS.registerProperty({
                name: '--border-angle',
                syntax: '<angle>',
                inherits: true,
                initialValue: '0deg',
            });
            // We just let CSS handle it if supported via a keyframe we'll inject
            const style = document.createElement('style');
            style.textContent = `
                @keyframes rotateBorder { to { --border-angle: 360deg; } }
                .node-card:hover { animation: rotateBorder 3s linear infinite; }
            `;
            document.head.appendChild(style);
        } catch(e) {
            // Browser doesn't support @property, fall back to simple CSS
        }
    }

</script>
</body>
</html>
